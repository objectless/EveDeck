name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: ver
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v1.3.1
          VERSION="${TAG#v}"                 # e.g. 1.3.1
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Update csproj version
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          $proj = "app/src/EveWindowCommander/EveWindowCommander.csproj"
          (Get-Content $proj) -replace '<Version>[^<]+</Version>', "<Version>$ver</Version>" |
            Set-Content $proj

      - name: Publish self-contained
        shell: pwsh
        run: |
          dotnet publish app/src/EveWindowCommander/EveWindowCommander.csproj `
            -c Release --self-contained -r win-x64 `
            -o publish-ci

      - name: Package as zip
        shell: pwsh
        run: |
          Compress-Archive -Path publish-ci\* -DestinationPath "EveDeck-v${{ steps.ver.outputs.version }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          repository: objectless/evedeck-releases
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          tag_name: v${{ steps.ver.outputs.version }}
          name: EveDeck v${{ steps.ver.outputs.version }}
          body: |
            Download **EveDeck-v${{ steps.ver.outputs.version }}.zip** below, extract, and run **EveDeck.exe**.

            No installer or .NET runtime required — everything is bundled.

            > **Windows SmartScreen:** click **More info → Run anyway** on first launch.
            > Right-click → Properties → Unblock also removes the prompt permanently.

            See [evedeck.space/releases](https://evedeck.space/releases) for full release notes.
          files: EveDeck-v${{ steps.ver.outputs.version }}.zip

  update-site:
    needs: build-and-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Prepend release to content.ts
        shell: bash
        env:
          VERSION: ${{ needs.build-and-release.outputs.version }}
        run: node site/scripts/add-release.mjs "$VERSION" "https://github.com/objectless/evedeck-releases/releases/download/v$VERSION/EveDeck-v$VERSION.zip"

      - name: Commit content.ts update
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/src/lib/content.ts
          if git diff --cached --quiet; then
            echo "content.ts unchanged — nothing to commit"
          else
            git commit -m "chore: add release v${{ needs.build-and-release.outputs.version }} to content.ts

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
            git push origin HEAD:main
          fi

      - name: Setup SSH and deploy
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_REMOTE_HOST: ${{ secrets.DEPLOY_REMOTE_HOST }}
          DEPLOY_REMOTE_USER: ${{ secrets.DEPLOY_REMOTE_USER }}
          DEPLOY_REMOTE_PATH: ${{ secrets.DEPLOY_REMOTE_PATH }}
        run: |
          mkdir -p "$HOME/.ssh"
          printf '%s' "$DEPLOY_SSH_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          ssh-keyscan -H "$DEPLOY_REMOTE_HOST" >> "$HOME/.ssh/known_hosts"
          chmod +x site/deploy/deploy.sh site/deploy/deploy-rsync.sh
          export EVEDECK_LOCAL_PATH="${{ github.workspace }}/site/"
          export EVEDECK_KEY_SSH="$HOME/.ssh/deploy_key"
          export EVEDECK_REMOTE_HOST="$DEPLOY_REMOTE_HOST"
          export EVEDECK_REMOTE_USER="$DEPLOY_REMOTE_USER"
          export EVEDECK_REMOTE_PATH="$DEPLOY_REMOTE_PATH"
          export EVEDECK_APP_NAME="evedeck"
          export EVEDECK_HEALTHCHECK_URL="https://evedeck.space/health"
          bash site/deploy/deploy.sh
