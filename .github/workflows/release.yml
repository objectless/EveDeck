name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      notes: ${{ steps.notes.outputs.notes }}
      portable_sha256: ${{ steps.vt.outputs.portable_sha256 }}
      portable_vt_url: ${{ steps.vt.outputs.portable_vt_url }}
      portable_vt_summary: ${{ steps.vt.outputs.portable_vt_summary }}
      portable_vt_clean: ${{ steps.vt.outputs.portable_vt_clean }}
      installer_sha256: ${{ steps.vt.outputs.installer_sha256 }}
      installer_vt_url: ${{ steps.vt.outputs.installer_vt_url }}
      installer_vt_summary: ${{ steps.vt.outputs.installer_vt_summary }}
      installer_vt_clean: ${{ steps.vt.outputs.installer_vt_clean }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: ver
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v1.3.1
          VERSION="${TAG#v}"                 # e.g. 1.3.1
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"

      - name: Extract changelog from tag message
        id: notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Read the tag's annotation via the GitHub API instead of the local checkout. Tried
          # `git for-each-ref --format='%(contents:body)'` against the checked-out repo twice
          # (v1.4.5, v1.4.6) and both times it silently returned the underlying COMMIT's message
          # instead of the tag's: actions/checkout resolves a tag-triggered workflow by commit SHA
          # (github.sha is the commit the annotated tag points to, not the tag object's own SHA),
          # so the local refs/tags/<name> ref it creates points straight at the commit and the
          # annotation is gone regardless of fetch-depth. The API has no such ambiguity -- it reads
          # the tag object directly by its own SHA.
          TAG="${GITHUB_REF_NAME}"
          OBJ_SHA="$(gh api "repos/${GITHUB_REPOSITORY}/git/refs/tags/$TAG" --jq .object.sha)"
          OBJ_TYPE="$(gh api "repos/${GITHUB_REPOSITORY}/git/refs/tags/$TAG" --jq .object.type)"
          if [ "$OBJ_TYPE" = "tag" ]; then
            MSG="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/$OBJ_SHA" --jq .message)"
            BODY="$(printf '%s\n' "$MSG" | tail -n +2 | sed '/./,$!d')"
          else
            BODY=""
          fi
          if [ -z "$(echo "$BODY" | tr -d '[:space:]')" ]; then
            BODY="No changelog notes were written for this tag."
          fi
          {
            echo "notes<<NOTES_EOF"
            echo "$BODY"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Update csproj version
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          $proj = "app/src/EveDeck/EveDeck.csproj"
          (Get-Content $proj) -replace '<Version>[^<]+</Version>', "<Version>$ver</Version>" |
            Set-Content $proj

      - name: Setup MSVC toolchain
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Compile Mumble plugin
        shell: cmd
        # The csproj's Content item for the plugin DLL is conditioned on this exact output path
        # existing at publish time (see EveDeck.csproj) -- must run before "Publish self-contained".
        run: |
          cd app\src\MumblePlugin
          if not exist bin mkdir bin
          cl /nologo /LD /O2 /EHsc /std:c++17 /W4 /DUNICODE /D_UNICODE EveDeckMumblePlugin.cpp /Fe:bin\EveDeckMumblePlugin.dll /Fo:bin\

      - name: Publish self-contained
        shell: pwsh
        run: |
          dotnet publish app/src/EveDeck/EveDeck.csproj `
            -c Release --self-contained -r win-x64 `
            -o publish-ci

      - name: Package portable app with Velopack
        shell: pwsh
        # Replaces the old plain zip with a Velopack-managed self-updating portable package (the
        # app's UpdateApplyService applies updates via Velopack for this track). Output filenames
        # are fixed by Velopack itself, not chosen here -- confirmed via a local `vpk pack` run:
        # Releases\EveDeck-win-Portable.zip (the human-facing download), EveDeck-<ver>-full.nupkg
        # + releases.win.json/RELEASES/assets.win.json (the update feed GithubSource reads), and
        # EveDeck-win-Setup.exe (Velopack's own installer, which we don't surface -- Inno Setup is
        # the installer track instead). `vpk download` seeds delta-patch generation from the prior
        # release; harmless no-op on the very first run when there's nothing to seed from yet.
        run: |
          dotnet tool install -g vpk
          vpk download github --repoUrl https://github.com/objectless/EveDeck --token ${{ secrets.GITHUB_TOKEN }}
          vpk pack -u EveDeck -v ${{ steps.ver.outputs.version }} -p publish-ci -e EveDeck.exe `
            --packTitle EveDeck --icon app\src\EveDeck\Assets\evedeck.ico

      - name: Build installer (Inno Setup)
        shell: pwsh
        # windows-latest usually ships Inno Setup 6 already, but install via choco (always present
        # on GH-hosted runners) if it's ever missing rather than assuming the image's software list.
        # MySourceDir points the .iss at publish-ci (repo root) instead of its local-dev default of
        # app\publish.
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup -y --no-progress
          }
          & $iscc app/installer/EveDeck.iss `
            "/DMyAppVersion=${{ steps.ver.outputs.version }}" `
            "/DMySourceDir=$PWD\publish-ci"

      - name: Scan release files with VirusTotal
        id: vt
        shell: pwsh
        # Scans both artifacts users can download (portable package AND installer) -- they're
        # different files with different hashes, so a badge for one says nothing about the other.
        # Doesn't scan the Velopack nupkg/feed files -- those aren't something a user downloads
        # directly. Same function runs twice with a distinct output prefix; each prefix's outputs
        # are independent.
        env:
          VT_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: |
          function Invoke-VtScan {
            param([string]$Path, [string]$Prefix)

            $hash = (Get-FileHash -Algorithm SHA256 -Path $Path).Hash.ToLower()
            "${Prefix}_sha256=$hash" >> $env:GITHUB_OUTPUT

            if (-not $env:VT_API_KEY) {
              Write-Warning "VIRUSTOTAL_API_KEY not set; skipping VirusTotal scan for $Path."
              "${Prefix}_vt_url=" >> $env:GITHUB_OUTPUT
              "${Prefix}_vt_summary=scan skipped (no API key configured)" >> $env:GITHUB_OUTPUT
              "${Prefix}_vt_clean=" >> $env:GITHUB_OUTPUT
              return
            }

            $headers = @{ "x-apikey" = $env:VT_API_KEY }
            # The hash-based report page 404s until VirusTotal has fully indexed the file, which
            # for a brand-new hash can outlast our poll window below (or never happen at all if
            # the upload silently failed) -- only safe to link to once we actually have a verdict.
            $fileUrl = "https://www.virustotal.com/gui/file/$hash"
            $stats = $null
            $analysisId = $null

            # A rebuild of an identical tree (rare, but possible) hashes the same -- skip a
            # redundant upload/scan if VirusTotal already has a report for this exact file.
            try {
              $existing = Invoke-RestMethod -Uri "https://www.virustotal.com/api/v3/files/$hash" -Headers $headers -Method Get -ErrorAction Stop
              $stats = $existing.data.attributes.last_analysis_stats
            } catch { }

            if (-not $stats) {
              try {
                $upResp = Invoke-RestMethod -Uri "https://www.virustotal.com/api/v3/files/upload_url" -Headers $headers -Method Get
                # Invoke-RestMethod's -Form quotes the multipart boundary in the Content-Type
                # header (PowerShell/PowerShell#9241); VirusTotal's API rejects a quoted
                # boundary with "Malformed multipart body." every time, so every upload since
                # this scan was added has silently failed. Shell out to the curl.exe that
                # ships on the Windows runner instead -- it sends an unquoted boundary VT accepts.
                $submitJson = & curl.exe -s -S -X POST -H "x-apikey: $($env:VT_API_KEY)" -F "file=@$Path" "$($upResp.data)"
                if ($LASTEXITCODE -ne 0) {
                  throw "curl.exe exited with code $LASTEXITCODE"
                }
                $submit = $submitJson | ConvertFrom-Json
                $analysisId = $submit.data.id

                # Fresh files typically finish in 2-4 minutes; give it up to 10 before moving on
                # rather than blocking the whole release on VirusTotal's queue.
                for ($i = 0; $i -lt 40; $i++) {
                  Start-Sleep -Seconds 15
                  $analysis = Invoke-RestMethod -Uri "https://www.virustotal.com/api/v3/analyses/$analysisId" -Headers $headers -Method Get
                  if ($analysis.data.attributes.status -eq "completed") {
                    $stats = $analysis.data.attributes.stats
                    break
                  }
                }
              } catch {
                Write-Warning "VirusTotal submission failed for $Path : $_"
                $analysisId = $null
              }
            }

            if (-not $stats) {
              if ($analysisId) {
                # Submission succeeded, VirusTotal just hasn't finished analyzing yet -- the
                # analysis-status page is valid immediately (unlike the file-hash page above)
                # and shows live progress, so link there instead of a page that would 404.
                $analysisUrl = "https://www.virustotal.com/gui/file-analysis/$analysisId"
                Write-Warning "VirusTotal scan did not finish in time for $Path -- still processing: $analysisUrl"
                "${Prefix}_vt_url=$analysisUrl" >> $env:GITHUB_OUTPUT
                "${Prefix}_vt_summary=scan submitted, still processing -- check the report directly" >> $env:GITHUB_OUTPUT
                "${Prefix}_vt_clean=" >> $env:GITHUB_OUTPUT
              } else {
                # Never actually got a report or an analysis id -- no VirusTotal page exists for
                # this hash yet, so don't link to one. The scheduled recheck will keep polling by
                # hash and pick this up automatically if the file ever does get scanned.
                Write-Warning "VirusTotal submission failed for $Path -- no report available yet."
                "${Prefix}_vt_url=" >> $env:GITHUB_OUTPUT
                "${Prefix}_vt_summary=scan submission failed -- will retry automatically" >> $env:GITHUB_OUTPUT
                "${Prefix}_vt_clean=" >> $env:GITHUB_OUTPUT
              }
              return
            }

            $malicious = [int]$stats.malicious
            $suspicious = [int]$stats.suspicious
            $clean = [int]$stats.undetected + [int]$stats.harmless
            $flagged = ($malicious -gt 0) -or ($suspicious -gt 0)
            $summary = if ($flagged) {
              "$malicious malicious / $suspicious suspicious (of $($clean + $malicious + $suspicious) engines) -- review before trusting this build"
            } else {
              "0/$clean detections — clean"
            }

            $cleanStr = if ($flagged) { "false" } else { "true" }
            "${Prefix}_vt_url=$fileUrl" >> $env:GITHUB_OUTPUT
            "${Prefix}_vt_summary=$summary" >> $env:GITHUB_OUTPUT
            "${Prefix}_vt_clean=$cleanStr" >> $env:GITHUB_OUTPUT
            if ($flagged) {
              Write-Warning "VirusTotal flagged $Path : $summary -- $fileUrl"
            }
          }

          Invoke-VtScan -Path "Releases\EveDeck-win-Portable.zip" -Prefix "portable"
          Invoke-VtScan -Path "app\installer\output\EveDeck-Setup-v${{ steps.ver.outputs.version }}.exe" -Prefix "installer"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: EveDeck v${{ steps.ver.outputs.version }}
          body: |
            ${{ steps.notes.outputs.notes }}

            **Two ways to install:**
            - **EveDeck-Setup-v${{ steps.ver.outputs.version }}.exe** — normal Windows installer (Start Menu
              shortcut, proper uninstaller, no admin rights needed). Recommended for most people.
            - **EveDeck-win-Portable.zip** — portable, just extract and run **EveDeck.exe**.

            No .NET runtime required either way — everything is bundled. Both tracks self-update in
            place (Options → About → Check for Updates, or the update banner).

            > **Windows SmartScreen:** click **More info → Run anyway** on first launch.
            > Right-click → Properties → Unblock also removes the prompt permanently.

            ---

            🛡️ **VirusTotal**
            - portable: [${{ steps.vt.outputs.portable_vt_summary }}](${{ steps.vt.outputs.portable_vt_url }}) (SHA-256 `${{ steps.vt.outputs.portable_sha256 }}`)
            - installer: [${{ steps.vt.outputs.installer_vt_summary }}](${{ steps.vt.outputs.installer_vt_url }}) (SHA-256 `${{ steps.vt.outputs.installer_sha256 }}`)
          files: |
            Releases/EveDeck-win-Portable.zip
            Releases/*.nupkg
            Releases/releases.win.json
            Releases/RELEASES
            Releases/assets.win.json
            app/installer/output/EveDeck-Setup-v${{ steps.ver.outputs.version }}.exe

  update-site:
    needs: build-and-release
    runs-on: ubuntu-latest

    steps:
      # The website lives in its own repo (EveDeck-site); check it out to record the
      # release and deploy. RELEASES_REPO_TOKEN must have write access to EveDeck-site.
      - uses: actions/checkout@v4
        with:
          repository: objectless/EveDeck-site
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          ref: main

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Prepend release to content.ts
        shell: bash
        env:
          VERSION: ${{ needs.build-and-release.outputs.version }}
          NOTES: ${{ needs.build-and-release.outputs.notes }}
          PORTABLE_SHA256: ${{ needs.build-and-release.outputs.portable_sha256 }}
          PORTABLE_VT_URL: ${{ needs.build-and-release.outputs.portable_vt_url }}
          PORTABLE_VT_SUMMARY: ${{ needs.build-and-release.outputs.portable_vt_summary }}
          PORTABLE_VT_CLEAN: ${{ needs.build-and-release.outputs.portable_vt_clean }}
          INSTALLER_SHA256: ${{ needs.build-and-release.outputs.installer_sha256 }}
          INSTALLER_VT_URL: ${{ needs.build-and-release.outputs.installer_vt_url }}
          INSTALLER_VT_SUMMARY: ${{ needs.build-and-release.outputs.installer_vt_summary }}
          INSTALLER_VT_CLEAN: ${{ needs.build-and-release.outputs.installer_vt_clean }}
        run: |
          # Same changelog text as the GitHub release body (both come from the annotated tag
          # message) — turn each "- bullet" line into its own whatsNew array entry instead of
          # falling back to the script's generic placeholder.
          mapfile -t BULLETS < <(echo "$NOTES" | sed -n 's/^[[:space:]]*[-*][[:space:]]*//p')
          FLAGS=("--installer-url=https://github.com/objectless/EveDeck/releases/download/v$VERSION/EveDeck-Setup-v$VERSION.exe")
          [ -n "$PORTABLE_SHA256" ] && FLAGS+=("--sha256=$PORTABLE_SHA256")
          [ -n "$PORTABLE_VT_URL" ] && FLAGS+=("--virustotal-url=$PORTABLE_VT_URL")
          [ -n "$PORTABLE_VT_SUMMARY" ] && FLAGS+=("--virustotal-summary=$PORTABLE_VT_SUMMARY")
          [ -n "$PORTABLE_VT_CLEAN" ] && FLAGS+=("--virustotal-clean=$PORTABLE_VT_CLEAN")
          [ -n "$INSTALLER_SHA256" ] && FLAGS+=("--installer-sha256=$INSTALLER_SHA256")
          [ -n "$INSTALLER_VT_URL" ] && FLAGS+=("--installer-virustotal-url=$INSTALLER_VT_URL")
          [ -n "$INSTALLER_VT_SUMMARY" ] && FLAGS+=("--installer-virustotal-summary=$INSTALLER_VT_SUMMARY")
          [ -n "$INSTALLER_VT_CLEAN" ] && FLAGS+=("--installer-virustotal-clean=$INSTALLER_VT_CLEAN")
          # downloadUrl / sha256 / virustotal-* here describe the Velopack portable package now,
          # not a plain zip -- reusing the same content.ts fields (no schema change) since this is
          # a replacement, not an addition, of the old portable download.
          node scripts/add-release.mjs "$VERSION" \
            "https://github.com/objectless/EveDeck/releases/download/v$VERSION/EveDeck-win-Portable.zip" \
            "${FLAGS[@]}" "${BULLETS[@]}"

      - name: Commit content.ts update
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/lib/content.ts
          if git diff --cached --quiet; then
            echo "content.ts unchanged — nothing to commit"
          else
            git commit -m "chore: add release v${{ needs.build-and-release.outputs.version }} to content.ts

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
            git push origin HEAD:main
          fi

      - name: Setup SSH and deploy
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_REMOTE_HOST: ${{ secrets.DEPLOY_REMOTE_HOST }}
          DEPLOY_REMOTE_USER: ${{ secrets.DEPLOY_REMOTE_USER }}
          DEPLOY_REMOTE_PATH: ${{ secrets.DEPLOY_REMOTE_PATH }}
        run: |
          mkdir -p "$HOME/.ssh"
          printf '%s' "$DEPLOY_SSH_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          ssh-keyscan -H "$DEPLOY_REMOTE_HOST" >> "$HOME/.ssh/known_hosts"
          chmod +x deploy/deploy.sh deploy/deploy-rsync.sh
          export EVEDECK_LOCAL_PATH="${{ github.workspace }}/"
          export EVEDECK_KEY_SSH="$HOME/.ssh/deploy_key"
          export EVEDECK_REMOTE_HOST="$DEPLOY_REMOTE_HOST"
          export EVEDECK_REMOTE_USER="$DEPLOY_REMOTE_USER"
          export EVEDECK_REMOTE_PATH="$DEPLOY_REMOTE_PATH"
          export EVEDECK_APP_NAME="evedeck"
          export EVEDECK_HEALTHCHECK_URL="https://evedeck.space/health"
          bash deploy/deploy.sh
