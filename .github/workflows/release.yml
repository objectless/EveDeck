name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: ver
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v1.3.1
          VERSION="${TAG#v}"                 # e.g. 1.3.1
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Update csproj version
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          $proj = "ewc/src/EveWindowCommander/EveWindowCommander.csproj"
          (Get-Content $proj) -replace '<Version>[^<]+</Version>', "<Version>$ver</Version>" |
            Set-Content $proj

      - name: Publish self-contained exe
        shell: pwsh
        run: |
          dotnet publish ewc/src/EveWindowCommander/EveWindowCommander.csproj `
            -c Release --self-contained -r win-x64 `
            -p:PublishSingleFile=true `
            -o publish-ci

      - name: Rename exe
        shell: pwsh
        run: Rename-Item publish-ci/EveWindowCommander.exe EveDeck.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: EveDeck v${{ steps.ver.outputs.version }}
          body: |
            Download **EveDeck.exe** below — single self-contained executable, no installer or .NET runtime required.

            See [evedeck.space/releases](https://evedeck.space/releases) for full release notes.
          files: publish-ci/EveDeck.exe

  update-site:
    needs: build-and-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Prepend release to content.ts
        shell: bash
        env:
          VERSION: ${{ needs.build-and-release.outputs.version }}
          REPO: ${{ github.repository }}
        run: node site/scripts/add-release.mjs "$VERSION" "https://github.com/$REPO/releases/download/v$VERSION/EveDeck.exe"

      - name: Commit content.ts update
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/src/lib/content.ts
          git commit -m "chore: add release v${{ needs.build-and-release.outputs.version }} to content.ts

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push origin HEAD:main

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H REDACTED-HOST >> ~/.ssh/known_hosts

      - name: Deploy site
        env:
          EVEDECK_LOCAL_PATH: ${{ github.workspace }}/site/
          EVEDECK_KEY_SSH: ~/.ssh/deploy_key
          EVEDECK_REMOTE_HOST: REDACTED-HOST
          EVEDECK_REMOTE_PATH: /home/REDACTED-USER/web/evedeck.space/private/app/
          EVEDECK_APP_NAME: evedeck
          EVEDECK_HEALTHCHECK_URL: https://evedeck.space/health
        run: bash site/deploy/deploy.sh
